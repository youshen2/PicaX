name: Build unsigned artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-unsigned-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select_run:
    name: Avoid duplicate branch and tag builds
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decision.outputs.should_build }}

    steps:
      # GitHub emits separate push events for the branch and tag even when they
      # are included in one git push. Let the tag run own a tagged commit.
      - name: Checkout branch push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select build run
        id: decision
        shell: bash
        run: |
          set -euo pipefail

          SHOULD_BUILD=true
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            MATCHING_TAG="$(git tag --points-at "${GITHUB_SHA}" --list 'v*')"
            if [[ -n "${MATCHING_TAG}" ]]; then
              SHOULD_BUILD=false
              echo "Skipping the main branch build because ${GITHUB_SHA} is tagged with ${MATCHING_TAG}."
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build unsigned artifacts
    needs: select_run
    if: needs.select_run.outputs.should_build == 'true'
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          set -euo pipefail

          for xcode_app in /Applications/Xcode_26.5.app /Applications/Xcode.app; do
            if [ -d "$xcode_app" ]; then
              sudo xcode-select -s "$xcode_app/Contents/Developer"
              break
            fi
          done

          xcodebuild -version
          xcodebuild -showsdks

      - name: Build unsigned artifacts
        run: bash build_all_unsigned.sh

      - name: Upload iOS unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: PicaX-iOS-unsigned-${{ github.run_number }}
          path: build/PicaX-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload iOS with Watch unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: PicaX-iOS-with-Watch-unsigned-${{ github.run_number }}
          path: build/PicaX-with-watch-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload Watch unsigned ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PicaX-WatchApp-unsigned-${{ github.run_number }}
          path: build/PicaX-WatchApp-unsigned.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload macOS unsigned DMG
        uses: actions/upload-artifact@v4
        with:
          name: PicaX-macOS-unsigned-${{ github.run_number }}
          path: build/PicaX.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Generate release body
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -n 1 || true)"

          append_release_commits() {
            awk '
              !/^[[:space:]]*\[X\]/ {
                print "- " $0
                found = 1
              }
              END {
                if (!found) {
                  print "- 本次没有需要公开展示的提交记录。"
                }
              }
            '
          }

          cat > release_body.md <<EOF
          这是由 GitHub Actions 自动构建的发行版本。

          ## 下载说明

          请在下方 Assets 中下载对应平台的构建产物。

          - \`PicaX-unsigned.ipa\`：iOS 未签名 IPA
          - \`PicaX-with-watch-unsigned.ipa\`：iOS + Watch 未签名 IPA
          - \`PicaX-WatchApp-unsigned.zip\`：Watch App 未签名 ZIP
          - \`PicaX.dmg\`：macOS 未签名 DMG

          ## 安装说明

          这些产物均为未签名构建，不能像 App Store 应用一样直接安装。

          iOS 版本通常需要自行签名后安装。
          Watch 版本通常需要自行通过XCode编译安装到Apple Watch。
          macOS 版本如遇到系统安全拦截，需要在系统设置中手动允许打开，或自行重新签名。

          ## 版本信息

          - 版本：\`${TAG_NAME}\`
          - Commit：\`${GITHUB_SHA}\`
          - 构建编号：\`${GITHUB_RUN_NUMBER}\`

          ## 更新内容

          EOF

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "从 \`${PREVIOUS_TAG}\` 到 \`${TAG_NAME}\` 的提交：" >> release_body.md
            echo "" >> release_body.md
            git log "${PREVIOUS_TAG}..${TAG_NAME}" --pretty=format:"%s" \
              | append_release_commits >> release_body.md
          else
            echo "最近提交：" >> release_body.md
            echo "" >> release_body.md
            git log -20 --pretty=format:"%s" \
              | append_release_commits >> release_body.md
          fi

          echo "" >> release_body.md
          echo "" >> release_body.md
          echo "---" >> release_body.md
          echo "" >> release_body.md
          echo "由 GitHub Actions 自动发布。" >> release_body.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PicaX ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: |
            build/PicaX-unsigned.ipa
            build/PicaX-with-watch-unsigned.ipa
            build/PicaX-WatchApp-unsigned.zip
            build/PicaX.dmg

  telegram:
    name: Send artifacts to Telegram channel
    needs:
      - select_run
      - build
    if: >-
      needs.select_run.outputs.should_build == 'true' &&
      needs.build.result == 'success' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout commit history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: PicaX-*-${{ github.run_number }}
          path: telegram-assets
          merge-multiple: true

      - name: Generate commit summary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          FALLBACK_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          python3 .github/scripts/ci_commit_summary.py \
            --current-sha "${TARGET_SHA}" \
            --current-run-id "${GITHUB_RUN_ID}" \
            --current-run-number "${GITHUB_RUN_NUMBER}" \
            --repository "${GITHUB_REPOSITORY}" \
            --workflow "build-unsigned.yml" \
            --fallback-sha "${FALLBACK_SHA}" \
            --output "${RUNNER_TEMP}/commit-summary.txt" \
            --chunks-directory "${RUNNER_TEMP}/telegram-commit-messages"

      - name: Send commit summary and artifacts to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [[ -z "${TELEGRAM_BOT_TOKEN}" ]]; then
            echo "::error::缺少 Actions Secret：TELEGRAM_BOT_TOKEN"
            exit 1
          fi

          if [[ -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "::error::缺少 Actions Secret：TELEGRAM_CHAT_ID"
            exit 1
          fi

          ARTIFACTS=(
            "telegram-assets/PicaX-unsigned.ipa"
            "telegram-assets/PicaX-with-watch-unsigned.ipa"
            "telegram-assets/PicaX-WatchApp-unsigned.zip"
            "telegram-assets/PicaX.dmg"
          )

          for ARTIFACT_PATH in "${ARTIFACTS[@]}"; do
            if [[ ! -f "${ARTIFACT_PATH}" ]]; then
              echo "::error::找不到待发送的构建产物：${ARTIFACT_PATH}"
              exit 1
            fi
          done

          telegram_error_description() {
            python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("description", "未知错误"))' \
              "$1" 2>/dev/null \
              || echo "无法读取 Telegram API 错误响应"
          }

          shopt -s nullglob
          SUMMARY_FILES=("${RUNNER_TEMP}"/telegram-commit-messages/message-*.txt)
          if (( ${#SUMMARY_FILES[@]} == 0 )); then
            echo "::error::找不到待发送的 Commit 汇总"
            exit 1
          fi

          MESSAGE_INDEX=0
          for SUMMARY_FILE in "${SUMMARY_FILES[@]}"; do
            MESSAGE_INDEX=$((MESSAGE_INDEX + 1))
            SUMMARY_TEXT="$(< "${SUMMARY_FILE}")"
            SUMMARY_RESPONSE="${RUNNER_TEMP}/telegram-summary-${MESSAGE_INDEX}.json"

            if ! curl \
                --fail-with-body \
                --silent \
                --show-error \
                --connect-timeout 15 \
                --max-time 60 \
                --request POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
                --form-string "text=${SUMMARY_TEXT}" \
                --output "${SUMMARY_RESPONSE}"; then
              DESCRIPTION="$(telegram_error_description "${SUMMARY_RESPONSE}")"
              echo "::error::Telegram API：${DESCRIPTION}"
              exit 1
            fi
          done

          SHORT_SHA="${COMMIT_SHA:0:7}"
          ARTIFACT_INDEX=0
          for ARTIFACT_PATH in "${ARTIFACTS[@]}"; do
            ARTIFACT_INDEX=$((ARTIFACT_INDEX + 1))
            ARTIFACT_NAME="$(basename "${ARTIFACT_PATH}")"
            CAPTION="$(printf 'PicaX CI 构建完成\n\n产物：%s\n版本：%s\nCommit：%s\n构建：#%s\n仓库：%s\n详情：%s' \
              "${ARTIFACT_NAME}" \
              "${REF_NAME}" \
              "${SHORT_SHA}" \
              "${RUN_NUMBER}" \
              "${REPOSITORY}" \
              "${RUN_URL}")"
            RESPONSE_FILE="${RUNNER_TEMP}/telegram-artifact-${ARTIFACT_INDEX}.json"

            if ! curl \
                --fail-with-body \
                --silent \
                --show-error \
                --connect-timeout 15 \
                --max-time 600 \
                --request POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
                --form "document=@${ARTIFACT_PATH};type=application/octet-stream" \
                --form-string "caption=${CAPTION}" \
                --output "${RESPONSE_FILE}"; then
              DESCRIPTION="$(telegram_error_description "${RESPONSE_FILE}")"
              echo "::error::Telegram API：${DESCRIPTION}"
              exit 1
            fi
          done

          echo "Commit 汇总和 4 个构建产物已发送到 Telegram 频道。"
